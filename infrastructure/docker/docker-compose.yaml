networks:
  app-network:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile.dev
    container_name: auth-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/auth-service/node_modules
    environment:
      - AUTH_PORT=4001
      - AUTH_MONGO_URI=${AUTH_DB_URI}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  product-service:
    build:
      context: ../../
      dockerfile: services/product-service/Dockerfile.dev
    container_name: product-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/product-service/node_modules
    environment:
      - PRODUCT_PORT=4002
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PRODUCT_MONGO_URI=${PRODUCT_DB_URI}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  order-service:
    build:
      context: ../../
      dockerfile: services/order-service/Dockerfile.dev
    container_name: order-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/order-service/node_modules
    environment:
      - ORDER_PORT=4003
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ORDER_MONGO_URI=${ORDER_DB_URI}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile.dev
    container_name: payment-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/payment-service/node_modules
    environment:
      - PAYMENT_PORT=4004
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PAYMENT_MONGO_URI=${PAYMENT_DB_URI}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  email-service:
    build:
      context: ../../
      dockerfile: services/email-service/Dockerfile.dev
    container_name: email-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/email-service/node_modules
    environment:
      - EMAIL_PORT=4005
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  chat-service:
    build:
      context: ../../
      dockerfile: services/chat-service/Dockerfile.dev
    container_name: chat-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/chat-service/node_modules
    environment:
      - CHAT_PORT=4006
      - CHAT_MONGO_URI=${CHAT_DB_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: docker-nginx-1
    ports:
      - "8000:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - chat-service
    networks:
      - app-network